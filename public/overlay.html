<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: transparent; overflow: hidden; }

    .pill {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 22px;
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.03em;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      transition: all 0.25s ease;
      cursor: default;
      user-select: none;
    }

    .pill.recording {
      display: flex;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fca5a5;
    }

    .pill.processing {
      display: flex;
      background: rgba(99, 102, 241, 0.12);
      border: 1px solid rgba(99, 102, 241, 0.35);
      color: #a5b4fc;
    }

    .pill.done {
      display: flex;
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.35);
      color: #86efac;
    }

    /* Status dot */
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .recording .dot { background: #ef4444; animation: pulse 1s ease-in-out infinite; }
    .processing .dot { background: #6366f1; animation: blink 0.8s ease-in-out infinite; }
    .done .dot { background: #22c55e; }

    /* Audio visualizer bars */
    .visualizer {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 20px;
    }
    .visualizer .bar {
      width: 3px;
      border-radius: 1.5px;
      background: #fca5a5;
      transition: height 0.06s ease-out;
      min-height: 3px;
    }
    .processing .visualizer .bar {
      background: #a5b4fc;
      height: 3px !important;
      animation: processing-wave 0.6s ease-in-out infinite;
    }
    .processing .visualizer .bar:nth-child(1) { animation-delay: 0s; }
    .processing .visualizer .bar:nth-child(2) { animation-delay: 0.08s; }
    .processing .visualizer .bar:nth-child(3) { animation-delay: 0.16s; }
    .processing .visualizer .bar:nth-child(4) { animation-delay: 0.24s; }
    .processing .visualizer .bar:nth-child(5) { animation-delay: 0.32s; }
    .processing .visualizer .bar:nth-child(6) { animation-delay: 0.40s; }
    .processing .visualizer .bar:nth-child(7) { animation-delay: 0.48s; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes processing-wave {
      0%, 100% { height: 3px; }
      50% { height: 12px; }
    }
  </style>
</head>
<body>
  <div id="pill" class="pill">
    <div class="dot"></div>
    <div id="visualizer" class="visualizer">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <span id="label">Listening</span>
  </div>

  <script>
    const pill = document.getElementById("pill");
    const label = document.getElementById("label");
    const bars = document.querySelectorAll("#visualizer .bar");
    let levelInterval = null;
    let currentState = "idle";

    function setState(state) {
      currentState = state;
      pill.className = "pill " + state;

      if (state === "recording") {
        label.textContent = "Listening";
        pill.style.display = "flex";
        startLevelPolling();
      } else if (state === "processing") {
        label.textContent = "Transcribing";
        pill.style.display = "flex";
        stopLevelPolling();
      } else if (state === "done") {
        label.textContent = "Done ✓";
        pill.style.display = "flex";
        stopLevelPolling();
      } else {
        pill.style.display = "none";
        stopLevelPolling();
      }
    }

    function startLevelPolling() {
      stopLevelPolling();
      levelInterval = setInterval(async () => {
        if (currentState !== "recording") return;
        try {
          const resp = await fetch("http://127.0.0.1:9876/api/level");
          const data = await resp.json();
          const level = data.level || 0;
          updateBars(level);
        } catch {
          // Server not reachable, show minimal bars
          updateBars(0);
        }
      }, 60); // ~16fps
    }

    function stopLevelPolling() {
      if (levelInterval) {
        clearInterval(levelInterval);
        levelInterval = null;
      }
    }

    function updateBars(level) {
      const numBars = bars.length;
      const mid = Math.floor(numBars / 2);
      for (let i = 0; i < numBars; i++) {
        // Bars are taller in the middle, with some randomness
        const distFromMid = Math.abs(i - mid) / mid;
        const base = 3;
        const maxH = 18;
        const noise = (Math.random() - 0.5) * 4 * level;
        const h = base + (maxH - base) * level * (1 - distFromMid * 0.5) + noise;
        bars[i].style.height = Math.max(base, Math.min(maxH, h)) + "px";
      }
    }

    // Listen for Tauri events
    if (window.__TAURI__) {
      window.__TAURI__.event.listen("vox-state", (event) => {
        if (event.payload === "idle") {
          setState("done");
        } else {
          setState(event.payload);
        }
      });
    }
  </script>
</body>
</html>
